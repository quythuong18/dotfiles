# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 5

set -s set-clipboard external

set -g mouse on
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection

set -g display-panes-time 10000

set-option -g status-position top
set-option -g base-index 1
set-option -g pane-base-index 1

set-option -g default-shell /home/thuongt/.local/bin/zsh

bind-key c new-window -n 'tmW' # set default name for new windows

bind-key g popup -E zsh 

unbind C-b
set-option -g prefix C-\\

# themes custom
set-window-option -g window-status-current-style fg=black,bg=#EFE9E3

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# set -g @plugin "nordtheme/tmux"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
